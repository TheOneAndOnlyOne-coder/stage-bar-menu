    <style>
        html { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; overscroll-behavior-y: contain; }

        /* Hide scrollbar for category row but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom scrollbar for body */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }

        /* General Menu Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title { animation: slideDown 0.6s ease-out forwards; animation-delay: 3.5s; opacity: 0;}
        .header-subtitle { animation: slideDown 0.6s ease-out forwards; animation-delay: 3.7s; opacity: 0; }

        /* --- CREATIVE SPLASH SCREEN ANIMATIONS --- */
        
        /* Text fading and scaling */
        @keyframes splashTextUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Neon flicker effect for the main title */
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 10px rgba(245, 158, 11, 0.7), 0 0 20px rgba(245, 158, 11, 0.5), 0 0 30px rgba(245, 158, 11, 0.3);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.8;
            }
        }

        /* Rising Champagne Bubbles */
        @keyframes rise {
            0% { bottom: -10px; transform: translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { bottom: 100vh; transform: translateX(-20px); opacity: 0; }
        }

        .splash-text-1 { opacity: 0; animation: splashTextUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 0.2s; }
        .splash-text-2 { 
            opacity: 0; 
            animation: 
                splashTextUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                neonFlicker 3s infinite alternate; 
            animation-delay: 0.7s, 1.5s; 
        }
        .splash-text-3 { opacity: 0; animation: splashTextUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 1.2s; }
        
        /* The credit animation */
        .splash-text-4 { opacity: 0; animation: fadeIn 1s ease-out forwards; animation-delay: 1.8s; }
        
        /* Icon animation */
        @keyframes drawIcon {
            0% { stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
            100% { stroke-dasharray: 100; stroke-dashoffset: 0; opacity: 1; }
        }
        .splash-icon {
            opacity: 0;
            animation: splashTextUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        /* Bubble styles */
        .bubble {
            position: absolute;
            background-color: rgba(245, 158, 11, 0.3);
            border-radius: 50%;
            z-index: 1;
        }
        .bubble:nth-child(1) { width: 10px; height: 10px; left: 20%; animation: rise 4s infinite ease-in; animation-delay: 0.1s; }
        .bubble:nth-child(2) { width: 15px; height: 15px; left: 40%; animation: rise 3s infinite ease-in; animation-delay: 1.2s; }
        .bubble:nth-child(3) { width: 8px; height: 8px; left: 60%; animation: rise 5s infinite ease-in; animation-delay: 0.5s; }
        .bubble:nth-child(4) { width: 20px; height: 20px; left: 80%; animation: rise 3.5s infinite ease-in; animation-delay: 0.8s; }
        .bubble:nth-child(5) { width: 12px; height: 12px; left: 30%; animation: rise 4.5s infinite ease-in; animation-delay: 1.5s; }
        .bubble:nth-child(6) { width: 6px; height: 6px; left: 70%; animation: rise 3.8s infinite ease-in; animation-delay: 0.3s; }

        /* --- END SPLASH SCREEN ANIMATIONS --- */

        .category-btn { transition: all 0.3s ease; white-space: nowrap; }
        .category-btn.active { 
            background-color: #f59e0b; 
            color: #111827; 
            font-weight: 700; 
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); 
        }

        .menu-item { 
            opacity: 0; 
            animation: fadeIn 0.4s ease-out forwards; 
            transition: all 0.2s ease;
        }
        .menu-item:hover { 
            background-color: #1f2937; 
            transform: scale(1.01); 
            border-radius: 12px; 
        }
        
        /* Utility to lock scrolling while splash is active */
        .no-scroll { overflow: hidden; height: 100vh; }
    </style>
</head>

            { category: "Spirits & Liqueurs", name: "Jameson", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Ballantine's", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Cutty Sark", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Grant's", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Jack Daniel's", price: "9.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Chivas Regal 12y", price: "10.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Glenfiddich 12y", price: "12.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Glenmorangie 10y", price: "12.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Ouzo 12", price: "5.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Tsipouro", price: "5.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Campari", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Martini", price: "6.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Aperol", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Jägermeister", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Jose Cuervo Gold / Silver", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Archers", price: "6.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Passoa Tropical", price: "6.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Bailey's", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Tia Maria", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Amaretto Disaronno", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Cointreau", price: "8.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Southern Comfort", price: "7.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Drambuie", price: "8.00", isAllIn: false },
            { category: "Spirits & Liqueurs", name: "Sambuca", price: "7.00", isAllIn: false }
        ];

        const categoryIcons = {
            'All': '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>',
            'Cocktails': '🍸',
            'Non-Alcoholic & Soft Drinks': '🥤',
            'Beers & Ciders': '🍺',
            'Wines & Sparkling': '🍷',
            'Spirits & Liqueurs': '🥃'
        };

        const menuItemsContainer = document.getElementById('menu-items');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const searchInput = document.getElementById('menu-search');

        let activeCategory = 'All';
        let searchQuery = '';
        
        // This keeps track of whether the app has passed the splash screen
        let isAppLoaded = false; 

        const renderMenu = () => {
            menuItemsContainer.innerHTML = '';
            
            const filteredMenu = menuData.filter(item => {
                const matchesCategory = activeCategory === 'All' || item.category === activeCategory;
                const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     (item.description && item.description.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesCategory && matchesSearch;
            });

            if(filteredMenu.length === 0) {
                menuItemsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <span class="text-4xl block mb-3 opacity-50">🧊</span>
                        <p>No drinks found matching "${searchQuery}"</p>
                    </div>`;
                return;
            }

            filteredMenu.forEach((item, index) => {
                const menuItemElement = document.createElement('div');
                menuItemElement.className = 'menu-item flex justify-between items-center py-4 px-4 border-b border-gray-800/50';
                
                // If the app is already loaded, items appear instantly (0 delay). 
                // If it's the very first load, they wait 3 seconds for the splash screen.
                const baseDelay = isAppLoaded ? 0 : 3000;
                menuItemElement.style.animationDelay = `${baseDelay + (index * 30)}ms`;
                
                const displayPrice = item.price === "FREE" ? "FREE" : `${item.price}€`;

                menuItemElement.innerHTML = `
                    <div class="pr-4">
                        <h3 class="font-bold text-white transition-colors duration-300">${item.name}</h3>
                        ${item.description ? `<p class="text-xs text-gray-400 mt-1 italic leading-relaxed">${item.description}</p>` : ''}
                    </div>
                    <div class="text-right min-w-[80px]">
                        <p class="font-bold text-amber-400">${displayPrice}</p>
                        ${item.isAllIn ? `<span class="text-[10px] bg-cyan-900/30 text-cyan-400 px-2 py-0.5 rounded border border-cyan-800/50 font-bold uppercase tracking-tighter inline-block mt-1">Included</span>` : ''}
                    </div>
                `;
                menuItemsContainer.appendChild(menuItemElement);
            });
        };

        const renderCategories = () => {
            const categories = ['All', ...new Set(menuData.map(item => item.category))];
            categories.forEach(category => {
                const button = document.createElement('button');
                const icon = categoryIcons[category] || '';
                button.innerHTML = `<span>${icon}</span> <span>${category}</span>`;
                button.className = 'category-btn px-5 py-2 text-sm font-medium rounded-full bg-gray-800 text-gray-300 hover:bg-gray-700 flex items-center gap-2 border border-gray-700';
                
                if (category === activeCategory) button.classList.add('active');
                
                button.addEventListener('click', () => {
                    activeCategory = category;
                    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    renderMenu();

                    // Scroll button into view on mobile
                    button.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                });
                categoryFiltersContainer.appendChild(button);
            });
        };

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderMenu();
        });

        // Splash screen logic
        const removeSplashScreen = () => {
            const splash = document.getElementById('splash-screen');
            const body = document.body;
            const mainContent = document.getElementById('main-content');
            
            if (splash && !isAppLoaded) {
                isAppLoaded = true; // Tell the app it's fully loaded now
                splash.style.opacity = '0';
                mainContent.style.opacity = '1';

                setTimeout(() => {
                    splash.remove();
                    body.classList.remove('no-scroll');
                }, 1000); // Matches the CSS transition duration
            }
        };

        window.onload = () => {
            renderCategories();
            renderMenu();

            // The splash screen stays up for exactly 3.2 seconds now. No early skipping!
            setTimeout(removeSplashScreen, 3200);
        };
    </script>
